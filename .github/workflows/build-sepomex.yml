# Radar Laguna · pipeline nativo SEPOMEX V1
name: Construir datos SEPOMEX

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - data/sepomex/CP_Coah.zip
      - data/sepomex/CP_Dgo.zip
      - scripts/build-sepomex.py
      - .github/workflows/build-sepomex.yml

permissions:
  contents: write

concurrency:
  group: build-sepomex-main
  cancel-in-progress: true

jobs:
  build:
    name: Generar capa postal ligera
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar conversores geográficos
        run: python -m pip install --disable-pip-version-check pyshp==2.3.1 shapely==2.1.1 pyproj==3.7.1

      - name: Generar datos optimizados
        run: python scripts/build-sepomex.py

      - name: Validar archivos generados
        run: |
          test -s data/geo/laguna-postal.compact.txt
          test -s data/sepomex/catalogo_asentamientos.json
          test -s data/sepomex/sepomex-build-report.json
          python -m json.tool data/sepomex/catalogo_asentamientos.json > /dev/null
          python -m json.tool data/sepomex/sepomex-build-report.json > /dev/null
          git diff --check

      - name: Publicar resultados en main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/geo/laguna-postal.compact.txt \
                  data/sepomex/catalogo_asentamientos.json \
                  data/sepomex/sepomex-build-report.json
          if git diff --cached --quiet; then
            echo "Los datos optimizados ya estaban actualizados."
            exit 0
          fi
          git commit -m "Generar capa postal desde ZIP SEPOMEX [skip ci]"
          git push origin HEAD:main
