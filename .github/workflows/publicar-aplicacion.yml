# Radar Laguna V11 · ensamblado automático
name: Publicar aplicación completa

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/project-payload/**'
      - '.github/workflows/publicar-aplicacion.yml'
  push:
    branches: [main]
    paths:
      - '.github/project-payload/**'
      - '.github/workflows/publicar-aplicacion.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruir paquete
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/radar-extract
          cat .github/project-payload/part-*.b64 > /tmp/radar-payload.b64
          base64 --decode /tmp/radar-payload.b64 > /tmp/radar-payload.gz
          gzip -dc /tmp/radar-payload.gz > /tmp/radar-payload.bin

          if tar -tf /tmp/radar-payload.bin >/dev/null 2>&1; then
            tar -xf /tmp/radar-payload.bin -C /tmp/radar-extract
          elif unzip -t /tmp/radar-payload.bin >/dev/null 2>&1; then
            unzip -q /tmp/radar-payload.bin -d /tmp/radar-extract
          else
            echo 'El paquete reconstruido no es un TAR ni un ZIP válido.' >&2
            file /tmp/radar-payload.bin || true
            exit 1
          fi

      - name: Sustituir contenido del repositorio
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          shopt -s dotglob nullglob
          entries=(/tmp/radar-extract/*)
          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            cp -a "${entries[0]}/." .
          else
            cp -a /tmp/radar-extract/. .
          fi

          test -f index.html
          test -f app.js
          test -f styles.css
          test -f supabase-config.js
          test -f data/sepomex/CP_Coah.zip
          test -f data/sepomex/CP_Dgo.zip

      - name: Validar JavaScript
        run: node --check app.js

      - name: Publicar en main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No hay cambios pendientes.'
            exit 0
          fi
          git commit -m 'Publicar Radar Laguna V11 conectada a Supabase'
          git push origin HEAD:main
