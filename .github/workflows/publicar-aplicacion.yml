name: Publicar Radar Laguna V11

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/project-payload/**'
      - '.github/workflows/publicar-aplicacion.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama del Pull Request
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Unir primera parte base64
        run: cat .github/project-payload/a-*.b64 > /tmp/radar-payload.b64

      - name: Verificar primera parte
        run: test "$(wc -c < /tmp/radar-payload.b64)" -eq 30000

      - name: Añadir fragmentos hexadecimales
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          target = Path('/tmp/radar-payload.b64')
          with target.open('ab') as output:
              for path in sorted(Path('.github/project-payload').glob('a-tail-*.hex')):
                  output.write(bytes.fromhex(path.read_text().strip()))
          PY

      - name: Verificar parte hexadecimal
        run: test "$(wc -c < /tmp/radar-payload.b64)" -eq 36000

      - name: Añadir segunda parte base64
        run: cat .github/project-payload/b-*.b64 >> /tmp/radar-payload.b64

      - name: Verificar tamaño total
        run: test "$(wc -c < /tmp/radar-payload.b64)" -eq 56084

      - name: Verificar firma base64
        run: test "$(sha256sum /tmp/radar-payload.b64 | cut -d' ' -f1)" = "4e46aab7f6702b17bc1711defa0e29f7d0c4e61958bf2a953abb76a06415e041"

      - name: Decodificar paquete
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          source = Path('/tmp/radar-payload.b64').read_bytes()
          Path('/tmp/radar-payload.gz').write_bytes(base64.b64decode(source, validate=True))
          PY

      - name: Verificar firma gzip
        run: test "$(sha256sum /tmp/radar-payload.gz | cut -d' ' -f1)" = "476172ce3c5856cfe481721657c9f6d1f8a676c4af02140226f5dc13944cdecb"

      - name: Extraer paquete
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/radar-extract /tmp/radar-preserve
          mkdir -p /tmp/radar-extract /tmp/radar-preserve/assets
          gzip -dc /tmp/radar-payload.gz > /tmp/radar-payload.tar
          tar -tf /tmp/radar-payload.tar >/dev/null
          tar -xf /tmp/radar-payload.tar -C /tmp/radar-extract
          if [ -f assets/logo-radar-laguna.png ]; then
            cp assets/logo-radar-laguna.png /tmp/radar-preserve/assets/
          fi

      - name: Sustituir contenido del repositorio
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          shopt -s dotglob nullglob
          entries=(/tmp/radar-extract/*)
          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            cp -a "${entries[0]}/." .
          else
            cp -a /tmp/radar-extract/. .
          fi
          mkdir -p assets
          if [ -f /tmp/radar-preserve/assets/logo-radar-laguna.png ]; then
            cp /tmp/radar-preserve/assets/logo-radar-laguna.png assets/
          fi
          test -f index.html
          test -f app.js
          test -f styles.css
          test -f supabase-config.js
          test -f supabase-service.js
          test -f assets/logo-radar-laguna.png

      - name: Validar JavaScript
        run: node --check app.js

      - name: Publicar en main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No hay cambios pendientes.'
            exit 0
          fi
          git commit -m 'Publicar Radar Laguna V11 conectada a Supabase'
          git push origin HEAD:main
